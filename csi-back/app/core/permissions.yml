version: "2026-07-19"

# 新增权限维护说明：
# 1. 页面权限使用 page:<模块>[:<页面或Tab>]:visible/access，仅控制前端展示和访问，backend_enforced 必须为 false。
# 2. 接口权限使用 operation:<模块>:<资源>:read/create/update/delete/execute，供后端授权时 backend_enforced 设为 true。
# 3. code 必须全局唯一；普通权限通常设置 system_reserved: false、delegable: true，并补全名称、模块、资源、描述和 tags。
# 4. 新增或修改后端接口权限时，还要同步更新 route_permissions.yml；新增前端权限判断时，同步更新 csi-front/src/utils/permissions.js。
# 5. 修改完成后运行后端权限/路由测试和前端测试；应用启动会将本清单幂等同步到 MongoDB，但不会重新启用已被管理员手动禁用的权限。
permissions:
  - {code: "*", name: "系统超级权限", module: "system", resource: "superuser", description: "仅供系统内置组使用", tags: [system, reserved], system_reserved: true, delegable: false, default_enabled: true, backend_enforced: true}

