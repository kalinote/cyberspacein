# GemBrowser compatibility routes
# These routes maintain backward compatibility with gem-server endpoints
# by proxying to python-server which now handles these endpoints.

# /v1/ping - already handled by nginx.python_srv.conf or direct response
location = /v1/ping {
    default_type 'text/plain; charset=utf-8';
    if ($request_method = GET) {
        return 200 "pong";
    }
    proxy_pass http://127.0.0.1:8091;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# /cdp/* - CDP proxy with URL rewriting
# Proxy to python-server which handles the CDP proxy functionality
# Note: X-Forwarded-Prefix should only contain external proxy path prefix,
# not the service's own route prefix (/cdp). The cdp.py code adds /cdp automatically.
location /cdp/ {
    proxy_pass http://127.0.0.1:8091/cdp/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # X-Forwarded-Prefix is passed through from upstream proxy if present
    proxy_connect_timeout 5s;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# Legacy gem-server routes - proxy to python-server equivalents
location ~ ^/(auth|tickets|screenshot|actions)$ {
    proxy_pass http://127.0.0.1:8091;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
