location = /browser-ui {
    default_type text/html;
    alias /opt/browser-ui/index.html;
}

# CDP WebSocket proxy for devtools connections
# browser-ui connects to ws://host/cdp/devtools/page/xxx or /cdp/devtools/browser/xxx
location ~ ^/cdp/devtools/ {
    # Strip the /cdp prefix and proxy to Chrome's remote debugging port
    rewrite ^/cdp(/.*)$ $1 break;
    proxy_pass http://127.0.0.1:9222;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # CDP is session-oriented traffic. Keep connect timeout short, but avoid
    # a short gateway-enforced session lifetime.
    proxy_connect_timeout 5s;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
