# Header-based port proxy via x-aio-proxy-port.
#
# Routes requests to the port specified in the x-aio-proxy-port request header.
# Intended for environments where the load balancer cannot support subdomain-based
# port routing (e.g. 8888-hostname), allowing users to route via a self-hosted
# HTTP proxy that injects this header instead.
#
# Priority: more specific locations (/v1, /jupyter, etc.) always win over this
# catch-all. Only paths with no other matching location reach here.
#
# The x-aio-proxy-port header is stripped before forwarding to the target service.
# nginx only allows `return` inside `if` blocks — proxy_pass, proxy_set_header,
# proxy_http_version, and timeouts are not permitted there.
# Pattern: use `if` only to emit a synthetic 418, then redirect internally to
# a named location (@aio_header_proxy) where all proxy directives live cleanly.
location = / {
    error_page 418 = @aio_header_proxy;
    if ($aio_proxy_port != "") {
        return 418;
    }
    rewrite ^ /index.html last;
}

location / {
    error_page 418 = @aio_header_proxy;
    if ($aio_proxy_port != "") {
        return 418;
    }
    return 404;
}

location @aio_header_proxy {
    proxy_http_version                      1.1;
    proxy_set_header Upgrade                $http_upgrade;
    proxy_set_header Connection             $connection_upgrade;
    proxy_set_header Host                   localhost:$aio_proxy_port;
    proxy_set_header Origin                 http://localhost:$aio_proxy_port;
    proxy_set_header Referer                http://localhost:$aio_proxy_port;
    proxy_set_header X-Request-ID           $http_x_request_id;
    proxy_set_header X-Real-IP              $remote_addr;
    proxy_set_header X-Forwarded-For        $remote_addr;
    proxy_set_header X-Forwarded-Host       $http_host;
    proxy_set_header X-Forwarded-Port       $server_port;
    proxy_set_header X-Forwarded-Proto      $scheme;
    proxy_set_header X-Forwarded-Scheme     $scheme;
    proxy_set_header X-Scheme               $scheme;
    proxy_set_header x-aio-proxy-port       "";
    proxy_connect_timeout                   5s;
    proxy_send_timeout                      3600s;
    proxy_read_timeout                      3600s;
    proxy_pass                              http://127.0.0.1:$aio_proxy_port;
}
