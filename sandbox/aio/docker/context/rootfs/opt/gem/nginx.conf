user nobody root;
worker_processes 1;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {

    ##
    # Basic Settings
    ##

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Pin nginx temp files to sandbox-owned paths instead of distro defaults
    # so large request bodies do not depend on image-specific permissions.
    client_body_temp_path /var/lib/aio-sandbox/nginx/body;
    proxy_temp_path /var/lib/aio-sandbox/nginx/proxy;
    fastcgi_temp_path /var/lib/aio-sandbox/nginx/fastcgi;
    scgi_temp_path /var/lib/aio-sandbox/nginx/scgi;
    uwsgi_temp_path /var/lib/aio-sandbox/nginx/uwsgi;

    ##
    # SSL Settings
    ##

    ssl_protocols TLSv1 TLSv1.1 TLSv1.2; # Dropping SSLv3, ref: POODLE
    ssl_prefer_server_ciphers on;

    ##
    # Logging Settings
    ##

    access_log /dev/stdout;
    error_log /dev/stderr;

    ##
    # Gzip Settings
    ##

    gzip on;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Validate x-aio-proxy-port header: only allow numeric values.
    # Empty result disables header-based port routing.
    map $http_x_aio_proxy_port $aio_proxy_port {
        ~^\d+$  $http_x_aio_proxy_port;
        default "";
    }

    include /opt/gem/nginx-server-active.conf;
    include /opt/gem/nginx-server-port-proxy.conf;
    include /opt/gem/nginx-proxy-map.conf;
}
