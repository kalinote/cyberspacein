<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!--
  Fontconfig alias configuration for AIO Sandbox.

  Maps commonly used but unavailable CJK font names to installed
  open-source alternatives. This is the standard Linux mechanism
  (same approach Debian uses to map Arial -> Liberation Sans).

  Covers: browsers, echarts, Pango/Cairo, weasyprint, manim, etc.
  Does NOT cover: matplotlib (has own font_manager, patched separately).
-->
<fontconfig>

  <!-- === Simplified Chinese: Sans-Serif === -->
  <alias><family>SimHei</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>黑体</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>Microsoft YaHei</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>微软雅黑</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>PingFang SC</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>苹方-简</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>STHeiti</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>华文黑体</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>Source Han Sans SC</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>思源黑体</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>DengXian</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
  <alias><family>等线</family>
    <accept><family>Noto Sans CJK SC</family></accept></alias>
