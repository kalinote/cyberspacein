  <alias><family>바탕</family>
    <accept><family>Noto Serif CJK KR</family></accept></alias>

  <!-- === Western (common CSS/Office fonts) === -->
  <alias><family>Arial</family>
    <accept><family>Liberation Sans</family></accept></alias>
  <alias><family>Times New Roman</family>
    <accept><family>Liberation Serif</family></accept></alias>
  <alias><family>Courier New</family>
    <accept><family>Liberation Mono</family></accept></alias>
  <alias><family>Verdana</family>
