name: CSI 后端测试

on:
  push:
    paths:
      - "csi-back/**"
      - ".github/workflows/csi-back-tests.yml"
  pull_request:
    paths:
      - "csi-back/**"
      - ".github/workflows/csi-back-tests.yml"

defaults:
  run:
    working-directory: csi-back

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: csi-back/requirements/requirements-dev.txt
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: 运行测试
        env:
          CI: "true"
        run: python -m pytest tests
